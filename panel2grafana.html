<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .cal-wrap { padding: 12px; font-family: "Inter", sans-serif; color: #c9d1d9; background: transparent; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .cal-title { font-size: 15px; font-weight: 500; color: #e6edf3; }
  .cal-nav { display: flex; gap: 6px; align-items: center; }
  .cal-nav button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 4px 10px;
    cursor: pointer; font-size: 14px; color: #8b949e;
    transition: background 0.15s;
  }
  .cal-nav button:hover { background: rgba(255,255,255,0.12); color: #e6edf3; }
  .cal-nav .month-label { font-size: 14px; font-weight: 500; color: #e6edf3; min-width: 150px; text-align: center; }
  .cal-legend { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #8b949e; }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }
  .dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .dow-cell { text-align: center; font-size: 11px; color: #6e7681; padding: 2px 0; font-weight: 600; letter-spacing: 0.05em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell {
    border-radius: 8px; padding: 6px 4px 5px; min-height: 58px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; cursor: pointer;
    transition: transform 0.12s; position: relative;
    border: 1px solid transparent;
  }
  .day-cell:hover { transform: scale(1.06); z-index: 2; border-color: rgba(255,255,255,0.2); }
  .day-cell.empty { background: none !important; cursor: default; pointer-events: none; }
  .day-cell.today { box-shadow: 0 0 0 2px rgba(255,255,255,0.45); }
  .day-num { font-size: 12px; font-weight: 500; color: #8b949e; margin-bottom: 3px; }
  .day-pct { font-size: 13px; font-weight: 600; }
  .day-bar-bg { width: 80%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px; }
  .day-bar { height: 3px; border-radius: 2px; }
  .summary-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .sum-card {
    flex: 1; min-width: 90px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 10px 12px;
  }
  .sum-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .sum-val { font-size: 20px; font-weight: 600; }
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #8b949e; margin-bottom: 12px;
    min-height: 20px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .loading-shimmer {
    animation: shimmer 1.4s infinite;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.04) 100%);
    background-size: 200% 100%;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .tooltip-box {
    position: fixed; background: #161b22;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 10px 13px;
    font-size: 13px; pointer-events: none;
    z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    min-width: 190px; display: none;
    font-family: "Inter", sans-serif;
  }
  .tooltip-box strong { font-weight: 500; display: block; margin-bottom: 6px; color: #e6edf3; }
  .tooltip-row { display: flex; justify-content: space-between; gap: 16px; color: #8b949e; margin-top: 3px; font-size: 12px; }
  .tooltip-row span:last-child { font-weight: 600; color: #e6edf3; }
  .host-list { margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.08); }
  .host-row { display: flex; justify-content: space-between; gap: 10px; font-size: 11px; color: #8b949e; margin-top: 3px; }
  .host-row span:last-child { font-weight: 500; }
</style>

<div class="cal-wrap">
  <div class="cal-header">
    <span class="cal-title">Disponibilidade — Linux servers</span>
    <div class="cal-nav">
      <button onclick="calChangeMonth(-1)">‹</button>
      <span class="month-label" id="calMonthLabel"></span>
      <button onclick="calChangeMonth(1)">›</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="calStatusDot" style="background:#6e7681"></div>
    <span id="calStatusText">Conectando ao Zabbix...</span>
  </div>

  <div class="cal-legend">
    <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div>100%</div>
    <div class="leg-item"><div class="leg-dot" style="background:#84cc16"></div>99 – 99.9%</div>
    <div class="leg-item"><div class="leg-dot" style="background:#eab308"></div>95 – 99%</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f97316"></div>90 – 95%</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>< 90%</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,0.15)"></div>Sem dados</div>
  </div>

  <div class="dow-row">
    <div class="dow-cell">DOM</div><div class="dow-cell">SEG</div><div class="dow-cell">TER</div>
    <div class="dow-cell">QUA</div><div class="dow-cell">QUI</div><div class="dow-cell">SEX</div>
    <div class="dow-cell">SÁB</div>
  </div>

  <div class="cal-grid" id="calGrid"></div>
  <div class="summary-row" id="calSummary"></div>
</div>

<div class="tooltip-box" id="calTooltip"></div>

<script>
(function() {
// ── CONFIGURAÇÃO ──────────────────────────────────────────────────────────────
const ZABBIX_URL   = 'url do zabbix server';
const ZABBIX_USER  = 'user';
const ZABBIX_PASS  = 'senha';
const HOST_GROUP   = 'grupo de host';
// Lógica MÉDIA: disponibilidade do grupo = média de uptime de todos os hosts
// Ex: 4 hosts, 1 offline 3h → (100+100+100+87.5)/4 = 96.875%
// ─────────────────────────────────────────────────────────────────────────────

const CAL_MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let calViewYear  = new Date().getFullYear();
let calViewMonth = new Date().getMonth();
const calToday   = new Date();

let zabbixToken  = null;
let calDayData   = {}; // { "YYYY-MM-DD": { pct, hosts: [{name, pct}] } }
let calLoading   = false;

// ── API ZABBIX ────────────────────────────────────────────────────────────────
// Zabbix 6.4+: token vai no header Authorization, não mais no body
async function zbxCall(method, params, useToken = true) {
  const body = { jsonrpc: '2.0', method, params, id: 1 };
  const headers = { 'Content-Type': 'application/json' };
  if (useToken && zabbixToken) {
    headers['Authorization'] = 'Bearer ' + zabbixToken;
  }
  const res = await fetch(ZABBIX_URL, {
    method: 'POST',
    headers,
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error.data || json.error.message);
  return json.result;
}

async function zbxLogin() {
  zabbixToken = await zbxCall('user.login',
    { username: ZABBIX_USER, password: ZABBIX_PASS }, false);
}

async function zbxGetHosts() {
  const groups = await zbxCall('hostgroup.get', {
    filter: { name: [HOST_GROUP] }, output: ['groupid','name']
  });
  if (!groups.length) throw new Error(`Grupo "${HOST_GROUP}" não encontrado`);
  const groupid = groups[0].groupid;

  const hosts = await zbxCall('host.get', {
    groupids: [groupid],
    output: ['hostid','name'],
    filter: { status: 0 } // apenas hosts habilitados
  });
  return hosts;
}

// Calcula disponibilidade de um host no período usando host availability history
// Lógica: soma dos intervalos em que o host estava disponível / total do período
async function zbxGetAvailability(hostids, dateFrom, dateTo) {
  const timeFrom = Math.floor(dateFrom.getTime() / 1000);
  const timeTill = Math.floor(dateTo.getTime() / 1000);
  const totalSec = timeTill - timeFrom;
  if (totalSec <= 0) return null;

  // Busca eventos de problema do host no período
  // Inclui severidades: Warning(2), Average(3), High(4), Disaster(5)
  const problems = await zbxCall('problem.get', {
    hostids,
    time_from: timeFrom,
    time_till: timeTill,
    output: ['eventid','objectid','clock','r_clock','name','severity'],
    severities: [2,3,4,5],
    limit: 1000
  });

  // Mescla intervalos sobrepostos para evitar contar downtime duplo
  // Ex: dois problemas simultâneos não dobram o downtime
  const intervals = problems.map(p => ({
    start: Math.max(parseInt(p.clock), timeFrom),
    end:   p.r_clock && parseInt(p.r_clock) > 0
           ? Math.min(parseInt(p.r_clock), timeTill)
           : timeTill
  })).filter(i => i.end > i.start)
     .sort((a, b) => a.start - b.start);

  // Merge de intervalos sobrepostos
  const merged = [];
  for (const iv of intervals) {
    if (merged.length && iv.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, iv.end);
    } else {
      merged.push({ ...iv });
    }
  }

  const downtimeSec = Math.min(
    merged.reduce((sum, iv) => sum + (iv.end - iv.start), 0),
    totalSec
  );

  return ((totalSec - downtimeSec) / totalSec) * 100;
}

// ── CARREGA MÊS COMPLETO ──────────────────────────────────────────────────────
async function calLoadMonth(year, month) {
  calSetStatus('loading', 'Buscando dados do Zabbix...');
  calLoading = true;
  calDayData = {};

  try {
    if (!zabbixToken) await zbxLogin();
    const hosts = await zbxGetHosts();
    if (!hosts.length) {
      calSetStatus('warn', `Nenhum host encontrado no grupo "${HOST_GROUP}"`);
      calLoading = false;
      calRender();
      return;
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(23,59,59,999);

    // Para cada dia do mês (até hoje), busca disponibilidade de cada host
    for (let d = 1; d <= daysInMonth; d++) {
      const dayStart = new Date(year, month, d, 0, 0, 0);
      const dayEnd   = new Date(year, month, d, 23, 59, 59);
      if (dayStart > today) break;

      const hostAvails = [];
      for (const host of hosts) {
        const pct = await zbxGetAvailability([host.hostid], dayStart, dayEnd);
        if (pct !== null) hostAvails.push({ name: host.name, pct });
      }

      if (hostAvails.length) {
        // MÉDIA: soma de uptime de todos os hosts dividido pelo total de hosts
        // Hosts sem dados no dia são ignorados do cálculo
        const groupPct = hostAvails.reduce((sum, h) => sum + h.pct, 0) / hostAvails.length;
        const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        calDayData[key] = { pct: groupPct, hosts: hostAvails, total: hostAvails.length };
      }
    }

    calSetStatus('ok', `${hosts.length} host(s) · atualizado ${new Date().toLocaleTimeString('pt-BR')}`);
  } catch(err) {
    // Token expirado — tenta relogar uma vez
    if (err.message && err.message.includes('Not authorised')) {
      zabbixToken = null;
      calLoading = false;
      return calLoadMonth(year, month);
    }
    calSetStatus('error', 'Erro: ' + err.message);
    console.error('Zabbix error:', err);
  }

  calLoading = false;
  calRender();
}

function calSetStatus(type, msg) {
  const dot  = document.getElementById('calStatusDot');
  const text = document.getElementById('calStatusText');
  text.textContent = msg;
  const colors = { ok:'#22c55e', loading:'#eab308', warn:'#f97316', error:'#ef4444' };
  dot.style.background = colors[type] || '#6e7681';
  if (type === 'loading') {
    dot.style.animation = 'shimmer 1s infinite';
  } else {
    dot.style.animation = 'none';
  }
}

// ── RENDERIZA CALENDÁRIO ──────────────────────────────────────────────────────
function calGetColor(pct) {
  if (pct >= 99.9) return { bg:'rgba(34,197,94,0.13)',  text:'#22c55e', bar:'#22c55e' };
  if (pct >= 99.0) return { bg:'rgba(132,204,22,0.13)', text:'#84cc16', bar:'#84cc16' };
  if (pct >= 95.0) return { bg:'rgba(234,179,8,0.13)',  text:'#eab308', bar:'#eab308' };
  if (pct >= 90.0) return { bg:'rgba(249,115,22,0.13)', text:'#f97316', bar:'#f97316' };
  return { bg:'rgba(239,68,68,0.18)', text:'#ef4444', bar:'#ef4444' };
}

function calRender() {
  document.getElementById('calMonthLabel').textContent =
    CAL_MONTHS[calViewMonth] + ' ' + calViewYear;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay    = new Date(calViewYear, calViewMonth, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  const avails      = [];

  // Células vazias
  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key     = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data    = calDayData[key];
    const isPast  = new Date(calViewYear, calViewMonth, d) <= calToday;
    const isToday = d === calToday.getDate() && calViewMonth === calToday.getMonth() && calViewYear === calToday.getFullYear();

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '');

    if (calLoading && isPast && !data) {
      // Shimmer enquanto carrega
      cell.classList.add('loading-shimmer');
      cell.style.background = 'rgba(255,255,255,0.04)';
      cell.innerHTML = `<span class="day-num">${d}</span>`;
    } else if (data) {
      avails.push(data.pct);
      const c    = calGetColor(data.pct);
      const barW = Math.round(Math.max(0, (data.pct - 80) / 20) * 100);
      cell.style.background = c.bg;
      cell.innerHTML = `
        <span class="day-num">${d}</span>
        <span class="day-pct" style="color:${c.text}">${data.pct.toFixed(1)}%</span>
        <div class="day-bar-bg"><div class="day-bar" style="width:${barW}%;background:${c.bar}"></div></div>
      `;
      cell.addEventListener('mouseenter', (e) => calShowTip(e, d, data));
      cell.addEventListener('mousemove', calPosTip);
      cell.addEventListener('mouseleave', calHideTip);
    } else if (isPast) {
      cell.style.background = 'rgba(255,255,255,0.03)';
      cell.innerHTML = `<span class="day-num">${d}</span><span class="day-pct" style="color:rgba(255,255,255,0.2)">—</span>`;
    } else {
      cell.style.background = 'rgba(255,255,255,0.02)';
      cell.innerHTML = `<span class="day-num" style="color:rgba(255,255,255,0.2)">${d}</span>`;
    }

    grid.appendChild(cell);
  }

  calRenderSummary(avails);
}

function calRenderSummary(avails) {
  const row = document.getElementById('calSummary');
  if (!avails.length) { row.innerHTML = ''; return; }
  const avg  = avails.reduce((a,b) => a+b, 0) / avails.length;
  const min  = Math.min(...avails);
  const crit = avails.filter(v => v < 95).length;
  const ok   = avails.filter(v => v >= 99.9).length;
  row.innerHTML = `
    <div class="sum-card"><div class="sum-label">Média do mês</div><div class="sum-val" style="color:${calGetColor(avg).text}">${avg.toFixed(2)}%</div></div>
    <div class="sum-card"><div class="sum-label">Mínimo registrado</div><div class="sum-val" style="color:${calGetColor(min).text}">${min.toFixed(2)}%</div></div>
    <div class="sum-card"><div class="sum-label">Dias 100%</div><div class="sum-val" style="color:#22c55e">${ok}</div></div>
    <div class="sum-card"><div class="sum-label">Incidentes (< 95%)</div><div class="sum-val" style="color:#ef4444">${crit}</div></div>
  `;
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
function calShowTip(e, day, data) {
  const t   = document.getElementById('calTooltip');
  const dow = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(calViewYear, calViewMonth, day).getDay()];
  const dt  = ((100 - data.pct) / 100) * 86400;
  const dtStr = dt < 60
    ? `${Math.round(dt)}s`
    : dt < 3600
      ? `${Math.round(dt/60)}min ${Math.round(dt%60)}s`
      : `${Math.floor(dt/3600)}h ${Math.round((dt%3600)/60)}min`;
  const sla  = data.pct >= 99.9 ? 'DENTRO DO SLA' : data.pct >= 99.0 ? 'ATENÇÃO' : 'FORA DO SLA';
  const slaC = data.pct >= 99.9 ? '#22c55e' : data.pct >= 99.0 ? '#eab308' : '#ef4444';
  const c    = calGetColor(data.pct);

  // Lista de hosts com disponibilidade individual
  const hostRows = (data.hosts || [])
    .sort((a,b) => a.pct - b.pct)
    .map(h => {
      const hc = calGetColor(h.pct);
      return `<div class="host-row"><span>${h.name}</span><span style="color:${hc.text}">${h.pct.toFixed(1)}%</span></div>`;
    }).join('');

  t.style.display = 'block';
  const hostsOnline = (data.hosts || []).filter(h => h.pct >= 99.9).length;
  const hostsTotal  = data.total || (data.hosts || []).length;
  t.innerHTML = `
    <strong>${dow}, ${String(day).padStart(2,'0')}/${String(calViewMonth+1).padStart(2,'0')}/${calViewYear}</strong>
    <div class="tooltip-row"><span>Disponibilidade média</span><span style="color:${c.text}">${data.pct.toFixed(3)}%</span></div>
    <div class="tooltip-row"><span>Hosts monitorados</span><span>${hostsTotal}</span></div>
    <div class="tooltip-row"><span>Hosts 100% no dia</span><span style="color:#22c55e">${hostsOnline}</span></div>
    <div class="tooltip-row"><span>Downtime médio</span><span>${dtStr}</span></div>
    <div class="tooltip-row"><span>Status SLA</span><span style="color:${slaC}">${sla}</span></div>
    ${hostRows ? `<div class="host-list">${hostRows}</div>` : ''}
  `;
  calPosTip(e);
}

function calPosTip(e) {
  const t = document.getElementById('calTooltip');
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 200 > window.innerWidth)  x = e.clientX - 204;
  if (y + 160 > window.innerHeight) y = e.clientY - 164;
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
}

function calHideTip() {
  document.getElementById('calTooltip').style.display = 'none';
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────────────
function calChangeMonth(dir) {
  calViewMonth += dir;
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  if (calViewMonth > 11) { calViewMonth = 0;  calViewYear++; }
  calRender();
  calLoadMonth(calViewYear, calViewMonth);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
calRender();
calLoadMonth(calViewYear, calViewMonth);
})();
</script>
