<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .top-wrap { padding: 12px; font-family: "Inter", sans-serif; color: #c9d1d9; background: transparent; }
  .top-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .top-title { font-size: 15px; font-weight: 500; color: #e6edf3; }
  .top-period { font-size: 12px; color: #8b949e; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 3px 10px; }
  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #8b949e; margin-bottom: 10px; min-height: 18px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Filtro ── */
  .filter-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 12px; font-family: "Inter", sans-serif;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px; color: #c9d1d9;
    padding: 4px 10px; cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.12); }
  .filter-btn.active { background: rgba(99,153,220,0.25); border-color: rgba(99,153,220,0.55); color: #93c5fd; }

  .filter-search {
    flex: 1; min-width: 140px; max-width: 280px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px; color: #e6edf3;
    font-size: 12px; font-family: "Inter", sans-serif;
    padding: 4px 10px; outline: none;
  }
  .filter-search::placeholder { color: #6e7681; }
  .filter-search:focus { border-color: rgba(99,153,220,0.5); background: rgba(255,255,255,0.09); }

  .filter-count {
    font-size: 11px; color: #6e7681;
    white-space: nowrap;
  }

  /* Dropdown de seleção de hosts */
  .host-selector-wrap {
    position: relative; width: 100%;
    margin-bottom: 10px;
  }
  .host-selector-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px; color: #c9d1d9;
    font-size: 12px; font-family: "Inter", sans-serif;
    padding: 6px 10px; cursor: pointer;
    transition: background 0.15s;
  }
  .host-selector-toggle:hover { background: rgba(255,255,255,0.09); }
  .host-selector-toggle .arrow { font-size: 10px; color: #6e7681; transition: transform 0.2s; }
  .host-selector-toggle.open .arrow { transform: rotate(180deg); }

  .host-dropdown {
    display: none; position: absolute; z-index: 100;
    top: calc(100% + 4px); left: 0; right: 0;
    background: #161b22;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-height: 280px; overflow-y: auto;
  }
  .host-dropdown.open { display: block; }

  .hd-search {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
    color: #e6edf3; font-size: 12px; font-family: "Inter", sans-serif;
    padding: 8px 12px; outline: none;
  }
  .hd-search::placeholder { color: #6e7681; }

  .hd-actions {
    display: flex; gap: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .hd-action {
    flex: 1; background: transparent;
    border: none; color: #8b949e;
    font-size: 11px; font-family: "Inter", sans-serif;
    padding: 5px 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .hd-action:hover { background: rgba(255,255,255,0.07); color: #c9d1d9; }

  .hd-list { padding: 4px 0; }
  .hd-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; cursor: pointer;
    font-size: 12px; color: #c9d1d9;
    transition: background 0.1s;
  }
  .hd-item:hover { background: rgba(255,255,255,0.06); }
  .hd-item.hidden { display: none; }
  .hd-cb {
    width: 14px; height: 14px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 3px; background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .hd-item.checked .hd-cb {
    background: #3b82f6; border-color: #3b82f6;
  }
  .hd-item.checked .hd-cb::after {
    content: ''; display: block;
    width: 8px; height: 5px;
    border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }
  .hd-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hd-cnt {
    font-size: 11px; color: #6e7681;
    background: rgba(255,255,255,0.07);
    border-radius: 4px; padding: 1px 6px;
    flex-shrink: 0;
  }
  .hd-empty { padding: 12px; text-align: center; color: #6e7681; font-size: 12px; }

  /* ── Ranking ── */
  .ranking-list { display: flex; flex-direction: column; gap: 6px; }

  .rank-item {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 10px 12px;
    transition: background 0.15s;
    cursor: default;
  }
  .rank-item:hover { background: rgba(255,255,255,0.07); }
  .rank-item.rank-1 { border-color: rgba(234,179,8,0.35); background: rgba(234,179,8,0.06); }
  .rank-item.rank-2 { border-color: rgba(148,163,184,0.3); background: rgba(148,163,184,0.05); }
  .rank-item.rank-3 { border-color: rgba(180,120,60,0.3); background: rgba(180,120,60,0.05); }

  .rank-pos {
    font-size: 20px; font-weight: 700; min-width: 32px;
    text-align: center; color: #6e7681; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .rank-item.rank-1 .rank-pos { color: #eab308; }
  .rank-item.rank-2 .rank-pos { color: #94a3b8; }
  .rank-item.rank-3 .rank-pos { color: #b4783c; }

  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 500; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-bar-wrap { margin-top: 5px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .rank-bar { height: 3px; border-radius: 2px; transition: width 0.6s ease; }

  .rank-count { text-align: right; min-width: 48px; }
  .rank-num { font-size: 18px; font-weight: 600; color: #e6edf3; line-height: 1; }
  .rank-label { font-size: 10px; color: #6e7681; margin-top: 2px; }

  .empty-state { text-align: center; padding: 32px 16px; color: #6e7681; font-size: 13px; }
  .skeleton { background: rgba(255,255,255,0.05); border-radius: 8px; height: 58px; animation: pulse 1.4s ease-in-out infinite; }
</style>

<div class="top-wrap">
  <div class="top-header">
    <span class="top-title">Top 10 — Hosts com Mais Alertas</span>
    <span class="top-period" id="topPeriod"></span>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="topStatusDot" style="background:#eab308; animation: pulse 1s infinite"></div>
    <span id="topStatusText">Conectando ao Zabbix...</span>
  </div>

  <!-- Filtro de hosts -->
  <div class="host-selector-wrap" id="hostSelectorWrap" style="display:none">
    <button class="host-selector-toggle" id="selectorToggle" onclick="toggleDropdown()">
      <span id="selectorLabel">Todos os hosts</span>
      <span class="arrow">▼</span>
    </button>
    <div class="host-dropdown" id="hostDropdown">
      <input class="hd-search" id="hdSearch" placeholder="Buscar host..." oninput="filterDropdown(this.value)">
      <div class="hd-actions">
        <button class="hd-action" onclick="selectAll()">Selecionar todos</button>
        <button class="hd-action" onclick="deselectAll()">Limpar seleção</button>
        <button class="hd-action" onclick="applyFilter()" style="color:#93c5fd">Aplicar ▶</button>
      </div>
      <div class="hd-list" id="hdList"></div>
    </div>
  </div>

  <div class="ranking-list" id="rankingList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton" style="opacity:.7"></div>
    <div class="skeleton" style="opacity:.5"></div>
  </div>
</div>

<script>
(function() {
const ZABBIX_URL  = 'url do zabbix';
const ZABBIX_USER = 'user zabbix';
const ZABBIX_PASS = 'senha zabbix';
const HOST_GROUP  = 'Linux servers';
const TOP_N       = 10;

let zbxToken    = null;
let allRanking  = [];   // ranking completo (todos os hosts com alertas)
let selectedIds = null; // null = todos; Set de nomes = filtrado

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const now        = new Date();
const monthStart = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0);
const timeFrom   = Math.floor(monthStart.getTime() / 1000);
const timeTill   = Math.floor(now.getTime() / 1000);

document.getElementById('topPeriod').textContent =
  `01–${String(now.getDate()).padStart(2,'0')} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

// ── API ───────────────────────────────────────────────────────────────────────
async function zbxCall(method, params, useToken = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (useToken && zbxToken) headers['Authorization'] = 'Bearer ' + zbxToken;
  const res = await fetch(ZABBIX_URL, {
    method: 'POST', headers,
    body: JSON.stringify({ jsonrpc: '2.0', method, params, id: 1 })
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error.data || json.error.message);
  return json.result;
}

async function zbxLogin() {
  zbxToken = await zbxCall('user.login',
    { username: ZABBIX_USER, password: ZABBIX_PASS }, false);
}

// ── CARGA DE DADOS ─────────────────────────────────────────────────────────────
async function loadRanking() {
  setStatus('loading', 'Autenticando...');
  try {
    if (!zbxToken) await zbxLogin();

    setStatus('loading', 'Buscando hosts do grupo...');

    const groups = await zbxCall('hostgroup.get', {
      filter: { name: [HOST_GROUP] }, output: ['groupid']
    });
    if (!groups.length) throw new Error(`Grupo "${HOST_GROUP}" não encontrado`);

    const hosts = await zbxCall('host.get', {
      groupids: [groups[0].groupid],
      output: ['hostid', 'name'],
      filter: { status: 0 }
    });
    if (!hosts.length) throw new Error('Nenhum host encontrado');

    setStatus('loading', `Contando alertas de ${hosts.length} hosts...`);

    const hostids = hosts.map(h => h.hostid);
    const events  = await zbxCall('event.get', {
      hostids,
      time_from:  timeFrom,
      time_till:  timeTill,
      value:      1,
      source:     0,
      object:     0,
      output:     ['eventid', 'clock', 'severity', 'name'],
      selectHosts: ['hostid', 'name'],
      sortfield:  'clock',
      sortorder:  'DESC',
      limit:      5000
    });

    const countMap = {};
    for (const h of hosts) countMap[h.hostid] = 0;

    for (const ev of events) {
      for (const eh of (ev.hosts || [])) {
        if (countMap[eh.hostid] !== undefined) countMap[eh.hostid]++;
      }
    }

    // Guarda o ranking completo (hosts com alertas) ordenado
    allRanking = hosts
      .map(h => ({ name: h.name, count: countMap[h.hostid] || 0 }))
      .filter(h => h.count > 0)
      .sort((a, b) => b.count - a.count);

    // Popula o dropdown com todos os hosts (com ou sem alerta), ordenados por nome
    const allHostsSorted = [...hosts].sort((a, b) => a.name.localeCompare(b.name));
    buildDropdown(allHostsSorted, countMap, hosts);

    document.getElementById('hostSelectorWrap').style.display = 'block';

    renderFiltered();
    setStatus('ok', `${hosts.length} host(s) · atualizado ${now.toLocaleTimeString('pt-BR')}`);

  } catch(err) {
    setStatus('error', 'Erro: ' + err.message);
    document.getElementById('rankingList').innerHTML =
      `<div class="empty-state" style="color:#ef4444">${err.message}</div>`;
    console.error('Zabbix error:', err);
  }
}

// ── DROPDOWN ──────────────────────────────────────────────────────────────────
let dropdownHosts = []; // [{name, count}] — todos os hosts

function buildDropdown(hosts, countMap, rawHosts) {
  dropdownHosts = hosts.map(h => ({ id: h.hostid, name: h.name, count: countMap[h.hostid] || 0 }));
  renderDropdownItems(dropdownHosts);
}

function renderDropdownItems(list) {
  const hdList = document.getElementById('hdList');
  if (!list.length) {
    hdList.innerHTML = '<div class="hd-empty">Nenhum host encontrado</div>';
    return;
  }
  hdList.innerHTML = list.map(h => `
    <div class="hd-item checked" data-name="${encodeURIComponent(h.name)}" onclick="toggleItem(this)">
      <div class="hd-cb"></div>
      <span class="hd-name" title="${h.name}">${h.name}</span>
      ${h.count > 0 ? `<span class="hd-cnt">${h.count}</span>` : ''}
    </div>`).join('');
}

window.toggleDropdown = function() {
  const dd  = document.getElementById('hostDropdown');
  const btn = document.getElementById('selectorToggle');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) document.getElementById('hdSearch').focus();
};

window.filterDropdown = function(q) {
  const items = document.querySelectorAll('#hdList .hd-item');
  const lq = q.toLowerCase();
  items.forEach(el => {
    const name = decodeURIComponent(el.dataset.name).toLowerCase();
    el.classList.toggle('hidden', lq !== '' && !name.includes(lq));
  });
};

window.toggleItem = function(el) {
  el.classList.toggle('checked');
};

window.selectAll = function() {
  document.querySelectorAll('#hdList .hd-item').forEach(el => el.classList.add('checked'));
};

window.deselectAll = function() {
  document.querySelectorAll('#hdList .hd-item').forEach(el => el.classList.remove('checked'));
};

window.applyFilter = function() {
  const checked = [...document.querySelectorAll('#hdList .hd-item.checked')];
  const total   = document.querySelectorAll('#hdList .hd-item').length;

  if (checked.length === 0 || checked.length === total) {
    selectedIds = null;
    document.getElementById('selectorLabel').textContent = 'Todos os hosts';
  } else {
    selectedIds = new Set(checked.map(el => decodeURIComponent(el.dataset.name)));
    document.getElementById('selectorLabel').textContent =
      `${checked.length} host${checked.length > 1 ? 's' : ''} selecionado${checked.length > 1 ? 's' : ''}`;
  }

  // Fecha dropdown
  document.getElementById('hostDropdown').classList.remove('open');
  document.getElementById('selectorToggle').classList.remove('open');
  document.getElementById('hdSearch').value = '';
  filterDropdown('');

  renderFiltered();
};

// Fecha dropdown ao clicar fora
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('hostSelectorWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('hostDropdown').classList.remove('open');
    document.getElementById('selectorToggle').classList.remove('open');
  }
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderFiltered() {
  let ranking = allRanking;

  if (selectedIds && selectedIds.size > 0) {
    ranking = allRanking.filter(h => selectedIds.has(h.name));
  }

  ranking = ranking.slice(0, TOP_N);

  if (!ranking.length) {
    document.getElementById('rankingList').innerHTML =
      '<div class="empty-state">Nenhum alerta para os hosts selecionados 🎉</div>';
    return;
  }

  const maxCount = ranking[0].count;
  const barColors = [
    '#eab308','#94a3b8','#b4783c',
    '#ef4444','#f97316','#f97316',
    '#eab308','#84cc16','#22c55e','#22c55e'
  ];

  const html = ranking.map((item, i) => {
    const pos      = i + 1;
    const barW     = Math.round((item.count / maxCount) * 100);
    const barColor = barColors[i] || '#6e7681';
    const rankClass = pos <= 3 ? ` rank-${pos}` : '';
    const medal    = pos <= 9 ? `0${pos}` : `${pos}`;

    return `
      <div class="rank-item${rankClass}">
        <div class="rank-pos">${medal}</div>
        <div class="rank-info">
          <div class="rank-name" title="${item.name}">${item.name}</div>
          <div class="rank-bar-wrap">
            <div class="rank-bar" style="width:${barW}%;background:${barColor}"></div>
          </div>
        </div>
        <div class="rank-count">
          <div class="rank-num">${item.count}</div>
          <div class="rank-label">alerta${item.count !== 1 ? 's' : ''}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('rankingList').innerHTML = html;
}

function setStatus(type, msg) {
  const dot  = document.getElementById('topStatusDot');
  const text = document.getElementById('topStatusText');
  text.textContent = msg;
  const colors = { ok:'#22c55e', loading:'#eab308', error:'#ef4444' };
  dot.style.background = colors[type] || '#6e7681';
  dot.style.animation  = type === 'loading' ? 'pulse 1s infinite' : 'none';
}

loadRanking();
})();
</script>
