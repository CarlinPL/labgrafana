---
- name: Aguarda SSH ficar disponível
  wait_for_connection:
    delay: 10
    timeout: 120

- name: Instala dependências
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Adiciona chave GPG do Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Adiciona repositório oficial do Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Instala Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes

- name: Instala Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: present

- name: Garante que Docker está rodando
  service:
    name: docker
    state: started
    enabled: yes

- name: Cria diretório do projeto
  file:
    path: /opt/monitoring
    state: directory
    mode: '0755'

- name: Copia docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /opt/monitoring/docker-compose.yml
    mode: '0644'

- name: Sobe os containers
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present