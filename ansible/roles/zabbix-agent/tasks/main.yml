---
- name: Aguarda SSH ficar disponível
  wait_for_connection:
    delay: 10
    timeout: 120

- name: Instala dependências
  apt:
    name:
      - wget
      - gnupg
    state: present
    update_cache: yes

- name: Baixa o repositório oficial do Zabbix
  get_url:
    url: https://repo.zabbix.com/zabbix/7.4/release/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.4+ubuntu24.04_all.deb
    dest: /tmp/zabbix-release.deb
    mode: '0644'

- name: Instala o repositório do Zabbix
  apt:
    deb: /tmp/zabbix-release.deb
    state: present

- name: Atualiza apt cache
  apt:
    update_cache: yes

- name: Instala o Zabbix Agent 2
  apt:
    name: zabbix-agent2
    state: present

- name: Configura o zabbix_agent2.conf
  template:
    src: zabbix_agentd.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart zabbix-agent2

- name: Garante que o Zabbix Agent está rodando
  service:
    name: zabbix-agent2
    state: started
    enabled: yes